<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111111"/>
      <stop offset="100%" style="stop-color:#333333"/>
    </linearGradient>
    <clipPath id="circle-clip">
      <circle cx="50" cy="50" r="48"/>
    </clipPath>
  </defs>

  <!-- Fond cercle -->
  <circle cx="50" cy="50" r="48" fill="url(#bg)"/>

  <!-- Bordure fine blanche -->
  <circle cx="50" cy="50" r="47" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>

  <!-- Accent diagonal -->
  <line x1="20" y1="80" x2="80" y2="20" stroke="white" stroke-width="0.8" opacity="0.15" stroke-linecap="round"/>

  <!-- Lettre M -->
  <text
    x="18"
    y="63"
    font-family="Georgia, serif"
    font-size="42"
    font-weight="bold"
    fill="white"
    letter-spacing="-2"
    clip-path="url(#circle-clip)"
  >M</text>

  <!-- Lettre D en blanc cassé, légèrement décalée -->
  <text
    x="48"
    y="63"
    font-family="Georgia, serif"
    font-size="42"
    font-weight="bold"
    fill="white"
    opacity="0.55"
    clip-path="url(#circle-clip)"
  >D</text>

  <!-- Point d'accentuation -->
  <circle cx="50" cy="78" r="2.5" fill="white" opacity="0.6"/>
</svg>
